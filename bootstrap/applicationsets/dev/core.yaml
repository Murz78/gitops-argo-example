---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crds
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/Murz78/gitops-argo-example.git
      revision: main
      directories:
        - path: dev/core
  template:
    metadata:
      name: '{{path.basename}}-sync'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: .
    spec:
      project: infra-apps
      source:
        repoURL: https://github.com/Murz78/gitops-argo-example.git
        targetRevision: main
        path: '{{path}}'
      destination:
        name: in-cluster
        namespace: argocd
      revisionHistoryLimit: 3
      ignoreDifferences:
      - group: "*"
        kind: Secret
        jsonPointers:
         - /data
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
        - Validate=true
        - CreateNamespace=true
        - PreserveResourcesOnDeletion=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
