---
extraObjects:
  # AppProject bootstrap-project that contains 2 apps that bootstrap other projects & appsets
  - apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: dev-bootstrap-project
      namespace: argocd
    spec:
      description: This is a bootstrap project
      sourceRepos:
        - https://github.com/Murz78/gitops-argo-example.git
      destinations:
        - namespace: argocd
          name: in-cluster
          server: https://kubernetes.default.svc
      namespaceResourceWhitelist:
        - group: argoproj.io
          kind: AppProject
        - group: argoproj.io
          kind: Application
        - group: argoproj.io
          kind: ApplicationSet
