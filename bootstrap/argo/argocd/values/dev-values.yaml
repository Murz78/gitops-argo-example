---
extraObjects:
  # AppProject bootstrap-project that contains 2 apps that bootstrap other projects & appsets
  - apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: dev-bootstrap-project
      namespace: argocd
    spec:
      description: This is a bootstrap project
      sourceRepos:
        - https://github.com/Murz78/gitops-argo-example.git
      destinations:
        - namespace: argocd
          name: in-cluster
          server: https://kubernetes.default.svc
      namespaceResourceWhitelist:
        - group: argoproj.io
          kind: AppProject
        - group: argoproj.io
          kind: Application
        - group: argoproj.io
          kind: ApplicationSet

  # Application that bootstraps all other projects
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: dev-app-of-projects
      namespace: infra-argocd
      annotations:
        argocd.argoproj.io/manifest-generate-paths: .
    spec:
      project: dev-bootstrap-project
      source:
        repoURL: https://gitlab.platform.corp/magnitonline/devops/market/infra-argocd.git
        targetRevision: master
        path: bootstrap/projects/dev
        directory:
          recurse: true
      destination:
        name: in-cluster
        namespace: infra-argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - Validate=true
          - CreateNamespace=true
          - PreserveResourcesOnDeletion=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
  # Application that bootstraps appsets
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: dev-app-of-appsets
      namespace: infra-argocd
      annotations:
        argocd.argoproj.io/manifest-generate-paths: .
    spec:
      project: dev-bootstrap-project
      source:
        repoURL: https://gitlab.platform.corp/magnitonline/devops/market/infra-argocd.git
        targetRevision: master
        path: bootstrap/applicationsets/dev/
        directory:
          recurse: true
      destination:
        name: in-cluster
        namespace: infra-argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - Validate=true
          - CreateNamespace=true
          - PreserveResourcesOnDeletion=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
