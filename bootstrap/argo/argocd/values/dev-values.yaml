---
extraObjects:
  # Cluster secret that registers the local cluster in Argo CD under the name "dev",
  # so ApplicationSets can use destination.name: dev
  - apiVersion: v1
    kind: Secret
    metadata:
      name: dev-cluster
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: cluster
    type: Opaque
    stringData:
      name: dev
      server: https://kubernetes.default.svc
  # AppProject bootstrap-project that contains 2 apps that bootstrap other projects & appsets
  - apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: dev-bootstrap-project
      namespace: argocd
    spec:
      description: This is a bootstrap project
      sourceRepos:
        - https://github.com/Murz78/gitops-argo-example.git
      destinations:
      - namespace: argocd
        name: in-cluster
        server: https://kubernetes.default.svc
      namespaceResourceWhitelist:
        - group: argoproj.io
          kind: AppProject
        - group: argoproj.io
          kind: Application
        - group: argoproj.io
          kind: ApplicationSet
